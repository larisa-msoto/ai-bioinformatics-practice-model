# -----------------------------------------------------------------------------
# AI-Augmented Bioinformatics Practice Model
# -----------------------------------------------------------------------------
site_name: AI-Augmented Bioinformatics Practice Model
repo_url: https://github.com/larisa-msoto/ai-bioinformatics-practice-model
edit_uri: 'blob/main/docs/'
docs_dir: docs/
site_description: "A professional practice model for AI-Augmented Bioinformatics based on Anthropic's 4D Framework"
site_author: Larisa M. Soto

nav:
  - Home: 
    - About: index.md
    - Community: 
      - How to Contribute: contributing.md
      - Contributors: contributors.md
      - Code of Conduct: code_of_conduct.md
    - Practice Model:
      - Delegation: delegation.md
      - Description: description.md
      - Discernment: discernment.md
      - Diligence: diligence.md  
      - References: references.md
  - Practice Model:
      - Delegation: delegation.md
      - Description: description.md
      - Discernment: discernment.md
      - Diligence: diligence.md
      - References: references.md
  - Community:
      - How to Contribute: contributing.md
      - Contributors: contributors.md
      - Code of Conduct: code_of_conduct.md

validation:
  omitted_files: warn
  absolute_links: warn  
  unrecognized_links: warn
  anchors: warn  # New in MkDocs 1.6
  links:
    absolute_links: relative_to_docs
    anchors: warn
    unrecognized_links: warn

theme:
  name: material
  locale: en
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy

  palette:
      # 1. Light Mode Configuration
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: indigo        # You can change this to indigo, teal, etc.
        accent: deep purple
        toggle:
          icon: material/brightness-7
          name: Switch to dark mode

      # 2. Dark Mode Configuration
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: indigo
        accent: deep purple
        toggle:
          icon: material/brightness-4
          name: Switch to light mode


plugins:
  - search
  - git-revision-date-localized:
      type: timeago

markdown_extensions:
  - toc:
      permalink: true
      baselevel: 2
      toc_depth: 3
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - attr_list
  - md_in_html


