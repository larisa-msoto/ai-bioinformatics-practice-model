# -----------------------------------------------------------------------------
# AI-Augmented Bioinformatics Practice Model
# -----------------------------------------------------------------------------
site_name: 4D-Bio: A professional practice model for AI-Augmented Bioinformatics
repo_url: https://github.com/larisa-msoto/ai-bioinformatics-practice-model
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
    - scheme: slate
      primary: indigo
      accent: deep purple

plugins:
  - search
  - git-revision-date-localized:
      type: timeago

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - attr_list
  - md_in_html

# NAVIGATION: Add your generated filenames here exactly as they are named in your docs/ folder
nav:
  - Home: index.md
  - Practice Model:
      - Delegation: delegation.md
      - Description: description.md
      - Discernment: discernment.md
      - Diligence: diligence.md
  - Community:
      - How to Contribute: contributing.md
      - Contributors: contributors.md
      - Code of Conduct: code_of_conduct.md
